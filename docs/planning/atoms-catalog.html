<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Prompt Atlas · 原子目录 v1.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Serif+SC:wght@400;600;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eae5dd; --paper:#f5f1e9; --ink:#1c1c1e; --muted:#6b6b6b;
  --hairline:rgba(0,0,0,0.12); --copper:#c87533; --teal:#224141;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{
  background:var(--bg);color:var(--ink);
  font-family:'Noto Serif SC','Fraunces',Georgia,serif;
  font-size:15px;line-height:1.65;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'IBM Plex Mono',ui-monospace,monospace}

/* Masthead */
header.top{
  position:sticky;top:0;z-index:20;
  background:var(--bg);
  border-top:4px solid var(--ink);
  border-bottom:1px solid var(--ink);
  padding:13px 32px;
  display:flex;align-items:baseline;justify-content:space-between;
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:0.26em;text-transform:uppercase;font-weight:500;
}
header.top::after{content:"";position:absolute;bottom:-5px;left:0;right:0;height:1px;background:var(--ink)}
header.top .brand{font-family:'Fraunces',serif;font-weight:900;font-style:italic;font-size:18px;letter-spacing:0;text-transform:none}
header.top .meta{display:flex;gap:22px;color:var(--muted)}

/* Layout */
.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 60px)}

/* Sidebar */
aside.nav{
  border-right:1px solid var(--ink);
  padding:32px 0 40px;
  position:sticky;top:60px;height:calc(100vh - 60px);
  overflow-y:auto;
  background:var(--bg);
}
aside.nav h2{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:0.26em;text-transform:uppercase;
  color:var(--copper);font-weight:700;
  margin:0 28px 14px;
}
aside.nav .layer-group{margin-bottom:22px}
aside.nav .layer-head{
  padding:10px 28px;
  font-family:'Fraunces',serif;
  font-weight:700;font-size:17px;
  border-top:1px solid var(--hairline);
  background:var(--paper);
  display:flex;justify-content:space-between;align-items:baseline;
}
aside.nav .layer-head .cn{font-size:15px}
aside.nav .layer-head .n{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;color:var(--muted);letter-spacing:0.14em;font-weight:500;
}
aside.nav ul{list-style:none;padding:0;margin:0}
aside.nav ul li a{
  display:flex;align-items:baseline;gap:10px;
  padding:8px 28px;
  color:var(--muted);text-decoration:none;
  font-size:14px;line-height:1.4;
  border-left:3px solid transparent;
  transition:all .12s;
}
aside.nav ul li a:hover{color:var(--ink);background:var(--paper)}
aside.nav ul li a.active{
  color:var(--copper);
  border-left-color:var(--copper);
  background:var(--paper);
  font-weight:600;
}
aside.nav ul li a .num{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;color:var(--muted);letter-spacing:0.06em;
  font-weight:500;min-width:20px;
}
aside.nav ul li a.active .num{color:var(--copper)}

/* Main */
main.content{padding:44px 56px 80px;max-width:900px}

main .hero{margin-bottom:56px;padding-bottom:32px;border-bottom:1px solid var(--ink)}
main .hero .kicker{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--copper);
  font-weight:700;margin-bottom:14px;
}
main .hero h1{
  font-family:'Fraunces',serif;font-weight:900;
  font-size:56px;line-height:1.0;letter-spacing:-0.02em;
  margin:0 0 18px;color:var(--ink);
}
main .hero h1 .c{color:var(--copper);font-style:italic}
main .hero .dek{
  font-family:'Fraunces',serif;font-style:italic;font-size:20px;
  color:var(--muted);max-width:48ch;margin:0 0 24px;line-height:1.45;font-weight:400;
}
main .hero .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid var(--ink);border-bottom:1px solid var(--ink)}
main .hero .stats .c{padding:12px 16px;border-right:1px solid var(--hairline)}
main .hero .stats .c:last-child{border-right:none}
main .hero .stats .n{font-family:'Fraunces',serif;font-weight:900;font-size:32px;color:var(--copper);line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
main .hero .stats .l{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-top:4px}

/* Layer banner */
.layer-banner{
  margin:64px 0 28px;padding:0 0 16px;
  border-bottom:2px solid var(--ink);
  display:flex;align-items:baseline;gap:18px;
}
.layer-banner .big{
  font-family:'Fraunces',serif;font-weight:900;font-size:64px;
  color:var(--copper);line-height:0.9;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;
}
.layer-banner .meta .name{font-family:'Fraunces',serif;font-weight:700;font-size:30px;color:var(--ink);margin:0;letter-spacing:-0.01em}
.layer-banner .meta .en{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.18em;color:var(--copper);text-transform:uppercase;font-weight:600;margin-top:4px}
.layer-banner .meta .sub{font-family:'Fraunces',serif;font-style:italic;font-size:14px;color:var(--muted);margin-top:6px}
.layer-banner .count{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);padding:4px 10px;border:1px solid var(--ink);font-weight:600}

/* Atom card */
article.atom{
  padding:28px 0 32px;
  border-bottom:1px solid var(--hairline);
  scroll-margin-top:80px;
}
article.atom:last-child{border-bottom:none}
article.atom .head{display:flex;align-items:baseline;gap:14px;margin-bottom:10px;flex-wrap:wrap}
article.atom .num{
  font-family:'Fraunces',serif;font-weight:900;font-size:28px;
  color:var(--copper);line-height:1;font-variant-numeric:tabular-nums;
}
article.atom .name{
  font-family:'Fraunces',serif;font-weight:800;font-size:26px;
  color:var(--ink);margin:0;letter-spacing:-0.01em;
}
article.atom .en{
  font-family:'IBM Plex Mono',monospace;font-size:11px;
  color:var(--muted);letter-spacing:0.14em;text-transform:uppercase;font-weight:500;
}
article.atom .badges{display:flex;gap:4px;margin-left:auto}
article.atom .badge{
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;letter-spacing:0.16em;text-transform:uppercase;font-weight:700;
  padding:3px 8px;border-radius:2px;
}
article.atom .badge.req{background:var(--copper);color:#fff}
article.atom .badge.opt{background:transparent;color:var(--muted);border:1px solid var(--hairline)}
article.atom .badge.cond{background:var(--teal);color:#fff}

article.atom .desc{font-size:15px;line-height:1.65;color:var(--ink);margin:6px 0 16px;max-width:60ch}

article.atom .row{display:flex;gap:20px;margin:14px 0}
article.atom .row .k{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);
  font-weight:600;min-width:84px;padding-top:2px;
}
article.atom .row .v{flex:1;font-size:14px}

article.atom .type-pill{
  display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;
  padding:2px 10px;border:1px solid var(--teal);color:var(--teal);
  border-radius:3px;font-weight:600;
}

article.atom .values{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
article.atom .values .v-item{
  font-family:'IBM Plex Mono',monospace;font-size:12px;
  padding:4px 10px;background:#fff;border:1px solid var(--hairline);
  border-radius:3px;color:var(--ink);
  display:inline-flex;align-items:center;gap:6px;
}
article.atom .values .v-item .zh{color:var(--muted);font-family:'Noto Serif SC',serif;font-size:11px}

article.atom .example{
  font-family:'IBM Plex Mono',monospace;font-size:12px;
  background:var(--paper);border-left:3px solid var(--copper);
  padding:10px 14px;color:var(--ink);margin-top:4px;
}
article.atom .example::before{content:"e.g. ";color:var(--copper);font-weight:600}

article.atom .notes{
  font-family:'Fraunces',serif;font-style:italic;font-size:13px;
  color:var(--muted);margin-top:4px;line-height:1.55;max-width:60ch;
}

/* Footer */
footer{
  border-top:4px solid var(--ink);margin-top:40px;padding:20px 32px 28px;
  font-family:'Fraunces',serif;font-style:italic;color:var(--muted);font-size:13px;
  text-align:center;
}

@media (max-width:900px){
  .app{grid-template-columns:1fr}
  aside.nav{position:relative;top:0;height:auto;border-right:none;border-bottom:1px solid var(--ink)}
  main.content{padding:24px}
  main .hero h1{font-size:36px}
  main .hero .stats{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<header class="top">
  <div class="brand">Prompt Atlas</div>
  <div class="meta">
    <span>原子目录</span>
    <span>v1.0 草案</span>
    <span>2026-04-22</span>
    <span>30 原子 · 3 层</span>
  </div>
</header>

<div class="app">

<aside class="nav" id="nav">
  <h2>目录 · Catalog</h2>
  <!-- JS 渲染 -->
</aside>

<main class="content">

  <section class="hero">
    <div class="kicker">N.01 · 原子表 / The Atom Table</div>
    <h1>每条 prompt<br>都能拆成这 <span class="c">30 原子</span></h1>
    <p class="dek">三层 · 三十槽 · 任何 AI 图像 prompt 都能归入其中某一类.<br>Schema 本身就是产品.</p>

    <div class="stats">
      <div class="c"><div class="n">3</div><div class="l">Layers</div></div>
      <div class="c"><div class="n">30</div><div class="l">Atoms</div></div>
      <div class="c"><div class="n">~180</div><div class="l">Enum Values</div></div>
      <div class="c"><div class="n">95%</div><div class="l">Coverage</div></div>
    </div>
  </section>

  <div id="root"></div>

</main>

</div>

<footer>Prompt Atlas · Schema v1.0 草案 · 依赖真实数据校准后定稿 · 2026</footer>

<script>
const schema = JSON.parse(document.getElementById('schema').textContent);

// Render nav
const nav = document.getElementById('nav');
schema.layers.forEach(layer => {
  const grp = document.createElement('div');
  grp.className = 'layer-group';
  grp.innerHTML = `
    <div class="layer-head"><span class="cn">第${layer.num}层 · ${layer.name}</span><span class="n">${layer.id} · ${layer.atoms.length}</span></div>
    <ul>
      ${layer.atoms.map(a => `
        <li><a href="#${layer.id}-${a.id}" data-target="${layer.id}-${a.id}">
          <span class="num">${a.num}</span>
          <span>${a.name}</span>
        </a></li>
      `).join('')}
    </ul>
  `;
  nav.appendChild(grp);
});

// Render main content
const root = document.getElementById('root');
schema.layers.forEach(layer => {
  const banner = document.createElement('div');
  banner.className = 'layer-banner';
  banner.innerHTML = `
    <div class="big">${layer.num === '一' ? '01' : layer.num === '二' ? '02' : '03'}</div>
    <div class="meta">
      <h2 class="name">第${layer.num}层 · ${layer.name}</h2>
      <div class="en">Layer ${layer.num === '一' ? 'One' : layer.num === '二' ? 'Two' : 'Three'} · ${layer.en}</div>
      <div class="sub">${layer.sub}</div>
    </div>
    <div class="count">${layer.atoms.length} 原子</div>
  `;
  root.appendChild(banner);

  layer.atoms.forEach(a => {
    const art = document.createElement('article');
    art.className = 'atom';
    art.id = `${layer.id}-${a.id}`;

    const reqClass = a.req === '必选' ? 'req' : a.req === '条件必选' ? 'cond' : 'opt';

    const valuesHTML = a.values && a.values.length
      ? `<div class="values">${a.values.map(v => `<span class="v-item">${v.k}<span class="zh">${v.zh}</span></span>`).join('')}</div>`
      : `<div class="values"><span class="v-item">自由输入 · 无枚举</span></div>`;

    art.innerHTML = `
      <div class="head">
        <span class="num">${a.num}</span>
        <h3 class="name">${a.name}</h3>
        <span class="en">${a.en}</span>
        <div class="badges"><span class="badge ${reqClass}">${a.req}</span></div>
      </div>
      <div class="desc">${a.desc}</div>
      <div class="row"><div class="k">类型</div><div class="v"><span class="type-pill">${a.type}</span></div></div>
      <div class="row"><div class="k">可选值</div><div class="v">${valuesHTML}</div></div>
      <div class="row"><div class="k">示例</div><div class="v"><div class="example">${a.example}</div></div></div>
      ${a.notes ? `<div class="row"><div class="k">用法备注</div><div class="v"><div class="notes">${a.notes}</div></div></div>` : ''}
    `;
    root.appendChild(art);
  });
});

// Smooth scroll + active nav
document.querySelectorAll('aside.nav a').forEach(link => {
  link.addEventListener('click', e => {
    e.preventDefault();
    const target = document.getElementById(link.dataset.target);
    if (target) target.scrollIntoView({behavior:'smooth', block:'start'});
  });
});

// IntersectionObserver for active nav
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting){
      document.querySelectorAll('aside.nav a').forEach(a => a.classList.remove('active'));
      const link = document.querySelector(`aside.nav a[data-target="${entry.target.id}"]`);
      if (link) link.classList.add('active');
    }
  });
}, {rootMargin: '-40% 0px -55% 0px'});

document.querySelectorAll('article.atom').forEach(a => observer.observe(a));
</script>

</body>
