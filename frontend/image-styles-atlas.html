  --bg: #050507;

  --bg-elevated: rgba(255, 255, 255, 0.04);

  --accent-strong: #8b5cf6;
  --accent-12: rgba(167, 139, 250, 0.12);
  --accent-20: rgba(167, 139, 250, 0.20);
  --warm: #f97316;
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
  --blue: #38bdf8;
  --pink: #f472b6;
  --border: rgba(255, 255, 255, 0.13);
  --border-soft: rgba(255, 255, 255, 0.06);
  --text: rgba(255, 255, 255, 0.96);
  --text-sub: rgba(255, 255, 255, 0.80);
  --text-60: rgba(255, 255, 255, 0.60);
  --text-40: rgba(255, 255, 255, 0.40);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {

  background-image:

    radial-gradient(ellipse 50% 20% at 80% 0%, rgba(167,139,250,0.12), transparent 60%),
    radial-gradient(ellipse 60% 20% at 50% 100%, rgba(124,58,237,0.10), transparent 60%),
    radial-gradient(ellipse 40% 15% at 20% 100%, rgba(249,115,22,0.06), transparent 60%);
  background-attachment: fixed;
  color: var(--text-sub);
  font: 18px/1.65 -apple-system, "PingFang SC", "Microsoft Yahei", sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ===== Layout ===== */
.shell { display: grid; grid-template-columns: 260px 1fr; gap: 32px; max-width: 1560px; margin: 0 auto; padding: 40px 32px 80px; }

/* ===== Sidebar ===== */
.sidebar { position: sticky; top: 40px; align-self: start; max-height: calc(100vh - 80px); overflow-y: auto;
  background: var(--bg-glass); backdrop-filter: blur(40px) saturate(2.0); -webkit-backdrop-filter: blur(40px) saturate(2.0);
  border: 1px solid var(--border); border-radius: 20px; padding: 20px 14px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), 0 8px 32px rgba(0,0,0,0.4); }
.sidebar h3 { margin: 4px 10px 14px; font-size: 12px; letter-spacing: 0.14em; color: var(--text-40); font-weight: 700; text-transform: uppercase; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; margin-bottom: 4px; border-radius: 12px;
  color: var(--text-sub); text-decoration: none; font-size: 15px; cursor: pointer; transition: background .2s, color .2s; border: 1px solid transparent; }
.nav-item:hover { background: var(--accent-12); color: var(--text); }
.nav-item.active { background: var(--accent-12); color: var(--text); border-color: var(--accent-20); }
.nav-item .emoji { font-size: 20px; }
.nav-item .count { margin-left: auto; font-size: 12px; color: var(--text-40); font-variant-numeric: tabular-nums; }

/* ===== Main ===== */
.main { min-width: 0; }

.hero { background: var(--bg-glass); backdrop-filter: blur(40px) saturate(2.0); -webkit-backdrop-filter: blur(40px) saturate(2.0);
  border: 1px solid var(--border); border-radius: 24px; padding: 44px 40px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), 0 8px 32px rgba(0,0,0,0.4); margin-bottom: 32px; }
.hero .eyebrow { font-size: 13px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 14px; }
.hero h1 { font-size: 52px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.08; color: var(--text); margin: 0 0 16px; }
.hero .tagline { font-size: 20px; color: var(--text-sub); margin: 0 0 22px; }
.hero .stats { display: flex; gap: 28px; flex-wrap: wrap; }
.hero .stat { display: flex; flex-direction: column; gap: 2px; padding: 8px 18px; border-left: 3px solid var(--accent); background: var(--accent-12); border-radius: 0 10px 10px 0; }
.hero .stat .num { font-size: 28px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
.hero .stat .lbl { font-size: 12px; color: var(--text-60); text-transform: uppercase; letter-spacing: 0.08em; }

/* ===== Category Section ===== */
.cat { margin-top: 56px; scroll-margin-top: 20px; }
.cat-head { display: flex; align-items: baseline; gap: 16px; padding-bottom: 16px; margin-bottom: 24px; border-bottom: 1px solid var(--border-soft); }
.cat-head .cat-emoji { font-size: 40px; line-height: 1; }
.cat-head h2 { margin: 0; font-size: 32px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); }
.cat-head .cat-count { margin-left: auto; font-size: 14px; color: var(--text-40); font-variant-numeric: tabular-nums; padding: 4px 12px; background: var(--bg-elevated); border-radius: 999px; border: 1px solid var(--border-soft); }

/* ===== Style Card ===== */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.card { background: var(--bg-glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
  transition: transform .2s, border-color .2s, box-shadow .2s;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.06); display: flex; flex-direction: column; }
.card:hover { transform: translateY(-3px); border-color: var(--accent-20); box-shadow: 0 12px 36px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1); }

.swatch { height: 88px; display: flex; align-items: center; justify-content: center; font-size: 38px; position: relative; overflow: hidden; }
.swatch::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.25)); pointer-events: none; }

.card-body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
.card-title { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.3; letter-spacing: -0.01em; }
.card-en { font-size: 12px; color: var(--text-40); font-family: "SF Mono", Menlo, monospace; letter-spacing: 0.02em; margin-top: -4px; }
.card-prompt { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 11.5px; color: var(--accent); background: var(--accent-12); border: 1px solid var(--accent-20);
  padding: 6px 10px; border-radius: 7px; line-height: 1.4; word-break: break-word; margin-top: 4px; }
.card-use { font-size: 12px; color: var(--text-60); display: inline-flex; align-items: center; gap: 6px; margin-top: auto; padding-top: 6px; }
.card-use::before { content: '▸'; color: var(--accent); }

/* ===== Swatch themes per category ===== */
.sw-classical_art { background: linear-gradient(135deg, #8b5a2b, #d4a574 50%, #f4e5c2); }
.sw-illustration  { background: linear-gradient(135deg, #f472b6, #fbbf24 50%, #34d399); }
.sw-anime         { background: linear-gradient(135deg, #fda4af, #c084fc 50%, #93c5fd); }
.sw-3d_render     { background: linear-gradient(135deg, #60a5fa, #c084fc 50%, #f472b6); }
.sw-photography   { background: linear-gradient(135deg, #374151, #9ca3af 50%, #d1d5db); }
.sw-digital_art   { background: linear-gradient(135deg, #7c3aed, #ec4899 50%, #06b6d4); }
.sw-oriental      { background: linear-gradient(135deg, #7f1d1d, #dc2626 50%, #fbbf24); }
.sw-cute_kawaii   { background: linear-gradient(135deg, #fbcfe8, #fecaca 50%, #fef3c7); }
.sw-meme_funny    { background: linear-gradient(135deg, #fbbf24, #f97316 50%, #ef4444); }
.sw-commercial    { background: linear-gradient(135deg, #ef4444, #ffffff 50%, #fbbf24); }
.sw-materials     { background: linear-gradient(135deg, #e5e7eb, #60a5fa 50%, #a78bfa); }
.sw-mood          { background: linear-gradient(135deg, #1e3a8a, #6366f1 50%, #a78bfa); }
.sw-industry      { background: linear-gradient(135deg, #0f172a, #334155 50%, #64748b); }

/* Scrollbar */
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Footer */
.foot { margin-top: 80px; padding: 28px; text-align: center; color: var(--text-40); font-size: 13px; border-top: 1px solid var(--border-soft); }
.foot code { background: var(--bg-elevated); padding: 2px 6px; border-radius: 4px; color: var(--accent); }

/* Responsive */
@media (max-width: 1024px) {
  .shell { grid-template-columns: 1fr; }
  .sidebar { position: static; max-height: none; }
  .nav-item { display: inline-flex; }
  .sidebar-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .hero h1 { font-size: 40px; }
}
</style>

/* ===== Render ===== */
const nav = document.getElementById('nav');
const cats = document.getElementById('cats');
let total = 0;

DATA.categories.forEach((cat, idx) => {
  total += cat.styles.length;

  // Nav
  const link = document.createElement('a');
  link.href = '#' + cat.id;
  link.className = 'nav-item' + (idx === 0 ? ' active' : '');
  link.dataset.target = cat.id;
  link.innerHTML = `<span class="emoji">${cat.emoji}</span><span>${cat.name_zh}</span><span class="count">${cat.styles.length}</span>`;
  nav.appendChild(link);

  // Section
  const sec = document.createElement('section');
  sec.className = 'cat';
  sec.id = cat.id;
  sec.innerHTML = `
    <div class="cat-head">
      <span class="cat-emoji">${cat.emoji}</span>
      <h2>${cat.name_zh}</h2>
      <span class="cat-count">${cat.styles.length} 种</span>
    </div>
    <div class="grid"></div>
  `;
  const grid = sec.querySelector('.grid');
  cat.styles.forEach(s => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.prompt = s.prompt_hint;
    card.title = '点击复制 prompt';
    card.innerHTML = `
      <div class="swatch sw-${cat.id}">${cat.emoji}</div>
      <div class="card-body">
        <div class="card-title">${s.zh}</div>
        <div class="card-en">${s.en}</div>
        <div class="card-prompt">${s.prompt_hint}</div>
        <div class="card-use">${s.use_case}</div>
      </div>
    `;
    card.addEventListener('click', () => {
      navigator.clipboard.writeText(s.prompt_hint).then(() => {
        const orig = card.style.borderColor;
        card.style.borderColor = 'var(--green)';
        card.style.boxShadow = '0 0 0 2px var(--green), 0 12px 36px rgba(52,211,153,0.3)';
        setTimeout(() => { card.style.borderColor = orig; card.style.boxShadow = ''; }, 800);
      });
    });
    grid.appendChild(card);
  });
  cats.appendChild(sec);
});

document.getElementById('total-count').textContent = total;

/* Nav scroll spy */
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      const link = document.querySelector(`.nav-item[data-target="${e.target.id}"]`);
      if (link) link.classList.add('active');
    }
  });
}, { rootMargin: '-30% 0px -60% 0px' });
document.querySelectorAll('.cat').forEach(c => observer.observe(c));

/* Smooth scroll */
nav.addEventListener('click', (e) => {
  const link = e.target.closest('.nav-item');
  if (!link) return;
  e.preventDefault();
  const t = document.getElementById(link.dataset.target);
  if (t) t.scrollIntoView({ behavior: 'smooth', block: 'start' });
});
</script>
