<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GPT Image 2 Hub · AI 生图灵感图鉴</title>
<style>
  :root {
    --bg: #0a0a0b;
    --bg-elev: #161618;
    --card: #1a1a1d;
    --card-hover: #222227;
    --border: rgba(255,255,255,0.08);
    --text: rgba(255,255,255,0.96);
    --text-mid: rgba(255,255,255,0.65);
    --text-dim: rgba(255,255,255,0.42);
    --accent: #ff2e51;
    --accent-2: #ff6b8a;
    --purple: #a78bfa;
    --shadow-card: 0 4px 20px rgba(0,0,0,0.4);
    --shadow-hover: 0 12px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
    --radius-card: 14px;
    --fs: 15px;
    --fsn: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: var(--fsn); font-size: var(--fs); }
  body { min-height: 100vh; overflow-x: hidden; }
  img { max-width: 100%; display: block; }

  /* ============ HEADER (2-row sticky) ============ */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,10,11,0.85);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--border);
  }
  .topbar-main {
    max-width: 1600px; margin: 0 auto;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 24px;
    padding: 14px 28px 10px;
  }
  .topbar-cats {
    max-width: 1600px; margin: 0 auto;
    padding: 2px 28px 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .gallery-tabs {
    display: flex; align-items: center; gap: 4px;
    flex-shrink: 0;
    padding-right: 8px;
    border-right: 1px solid var(--border);
  }
  .gallery-tab {
    padding: 8px 16px; border-radius: 999px;
    background: transparent; color: var(--text-mid);
    font-size: 14px; font-weight: 500;
    border: none; cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
    transition: all 0.18s ease;
  }
  .gallery-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .gallery-tab.active {
    color: #fff; background: rgba(255,255,255,0.1);
    font-weight: 700;
  }
  .gallery-tab .count {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; height: 18px;
    margin-left: 4px; padding: 0 5px;
    border-radius: 999px;
    background: rgba(255,46,81,0.18);
    color: var(--accent-2);
    font-size: 11px; font-weight: 700;
  }

  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 18px; letter-spacing: -0.01em;
    white-space: nowrap;
  }
  .brand-dot {
    width: 26px; height: 26px; border-radius: 8px;
    background: linear-gradient(135deg, #ff2e51, #a78bfa);
    box-shadow: 0 4px 14px rgba(255,46,81,0.35);
  }
  .brand-name { background: linear-gradient(90deg, #fff, #a78bfa); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .brand-sub { display: none; }

  /* 搜索(居中 · 宽) */
  .search-box {
    justify-self: center;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 18px; border-radius: 999px;
    background: var(--bg-elev); border: 1px solid var(--border);
    color: var(--text-mid); font-size: 14px;
    width: 100%;
    max-width: 540px;
    transition: border-color 0.18s ease, background 0.18s ease;
  }
  .search-box:focus-within { border-color: rgba(167,139,250,0.5); background: #1a1a20; }
  .search-box svg { width: 16px; height: 16px; opacity: 0.55; flex-shrink: 0; }
  .search-box input { flex: 1; background: transparent; border: none; color: var(--text); outline: none; font-family: inherit; font-size: 14px; }
  .search-box input::placeholder { color: var(--text-dim); }

  /* 筛选栏 */
  .gallery-shell {
    max-width: 1720px;
    margin: 0 auto;
    padding: 20px 24px 80px;
    display: grid;
    grid-template-columns: 260px minmax(0, 1fr);
    gap: 20px;
    align-items: start;
  }
  .gallery-main { min-width: 0; }
  .filter-bar {
    position: sticky;
    top: 116px;
    max-height: calc(100vh - 136px);
    overflow: auto;
    padding: 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: rgba(22,22,24,0.78);
  }
  .filter-details { display: block; }
  .filter-summary {
    display: none;
    cursor: pointer;
    color: var(--text);
    font-weight: 700;
    list-style: none;
  }
  .filter-summary::-webkit-details-marker { display: none; }
  .filter-body { display: grid; gap: 18px; }
  .filter-group h4 {
    margin-bottom: 10px;
    color: var(--text-mid);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .filter-options {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .filter-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 30px;
    padding: 5px 9px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
    color: var(--text-mid);
    font-size: 12px;
    cursor: pointer;
    user-select: none;
    transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
  }
  .filter-chip:hover {
    color: var(--text);
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.14);
  }
  .filter-chip input {
    width: 13px;
    height: 13px;
    accent-color: var(--accent);
    flex-shrink: 0;
  }
  .filter-chip:has(input:checked) {
    color: #fff;
    border-color: rgba(255,46,81,0.42);
    background: rgba(255,46,81,0.14);
  }
  .filter-chip .count {
    color: var(--text-dim);
    font-size: 11px;
  }
  .filter-footer {
    display: grid;
    gap: 10px;
    padding-top: 2px;
  }
  .filter-count {
    color: var(--text-dim);
    font-size: 12px;
  }
  .clear-filter-btn {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    background: var(--bg-elev);
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    transition: background 0.16s ease, border-color 0.16s ease;
  }
  .clear-filter-btn:hover {
    background: var(--card-hover);
    border-color: rgba(255,255,255,0.16);
  }

  /* 分类条(独立行) */
  .categories {
    display: flex; gap: 4px;
    flex: 1; min-width: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .categories::-webkit-scrollbar { display: none; }
  .category {
    padding: 8px 16px; border-radius: 999px;
    background: transparent; color: var(--text-mid);
    font-size: 14px; font-weight: 500;
    border: none; cursor: pointer;
    white-space: nowrap;
    transition: all 0.18s ease;
  }
  .category:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .category.active {
    color: #fff; background: rgba(255,255,255,0.1);
    font-weight: 700;
  }

  /* 顶部右区:github + x + 语言 */
  .top-right {
    display: flex; align-items: center; gap: 6px;
  }
  .top-icon-link {
    width: 36px; height: 36px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    background: transparent; border: 1px solid transparent;
    color: var(--text-mid); cursor: pointer;
    text-decoration: none;
    transition: all 0.18s ease;
  }
  .top-icon-link:hover {
    color: var(--text);
    background: var(--bg-elev);
    border-color: var(--border);
  }
  .top-icon-link svg { width: 18px; height: 18px; }

  /* 语言下拉 */
  .lang-dd { position: relative; flex-shrink: 0; }
  .lang-dd-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 999px;
    background: var(--bg-elev); border: 1px solid var(--border);
    color: var(--text-mid); font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    transition: all 0.18s ease;
  }
  .lang-dd-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.18); }
  .lang-dd-btn .globe { width: 14px; height: 14px; opacity: 0.6; }
  .lang-dd-btn .caret { width: 10px; height: 10px; opacity: 0.55; transition: transform 0.2s; }
  .lang-dd.open .lang-dd-btn .caret { transform: rotate(180deg); }
  .lang-dd.open .lang-dd-btn { border-color: rgba(167,139,250,0.4); color: var(--text); }

  .lang-dd-menu {
    position: absolute; right: 0; top: calc(100% + 8px);
    min-width: 180px;
    background: rgba(22,22,24,0.98);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    padding: 6px;
    z-index: 60;
    display: none;
  }
  .lang-dd.open .lang-dd-menu { display: block; animation: dd-in 0.16s ease; }
  @keyframes dd-in { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

  .lang-opt {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 8px 12px;
    background: transparent; border: none; cursor: pointer;
    color: var(--text-mid); font-size: 13px; font-weight: 500;
    font-family: inherit;
    border-radius: 8px;
    text-align: left;
    transition: all 0.12s ease;
  }
  .lang-opt:hover { background: rgba(255,255,255,0.06); color: var(--text); }
  .lang-opt.active {
    background: linear-gradient(135deg, rgba(255,46,81,0.12), rgba(167,139,250,0.12));
    color: #fff;
  }
  .lang-opt .flag {
    font-size: 16px; line-height: 1;
    filter: saturate(1.15);
  }
  .lang-opt .opt-native {
    flex: 1;
    font-weight: 600;
  }
  .lang-opt .opt-en {
    font-size: 11px; color: var(--text-dim);
    font-weight: 500;
  }
  .lang-opt.active .opt-en { color: rgba(255,255,255,0.5); }

  /* ============ WATERFALL (卡宽固定 · 自动列数) ============ */
  .waterfall {
    max-width: 1720px; margin: 0 auto;
    padding: 20px 24px 80px;
    column-width: 280px;   /* 🔴 固定卡宽 · 内容可控 */
    column-gap: 16px;
  }
  .gallery-shell .waterfall {
    max-width: none;
    padding: 0;
  }
  @media (max-width: 780px) {
    .gallery-shell { display: block; padding: 16px 14px 60px; }
    .filter-bar {
      position: static;
      max-height: none;
      overflow: visible;
      padding: 0;
      margin-bottom: 12px;
      border-radius: 10px;
    }
    .filter-details { padding: 0; }
    .filter-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
    }
    .filter-summary::after {
      content: "⌄";
      color: var(--text-dim);
      font-size: 16px;
      transition: transform 0.16s ease;
    }
    .filter-details[open] .filter-summary::after { transform: rotate(180deg); }
    .filter-body {
      gap: 16px;
      padding: 0 14px 14px;
    }
    .filter-options { gap: 7px; }
    .waterfall { column-width: 170px; column-gap: 10px; padding: 16px 14px 60px; }
    .gallery-shell .waterfall { padding: 0; }
    .topbar-main { padding: 10px 14px 8px; gap: 12px; grid-template-columns: auto 1fr auto; }
    .topbar-cats { padding: 0 14px 10px; flex-wrap: wrap; gap: 8px; }
    .gallery-tabs { width: 100%; border-right: 0; padding-right: 0; }
    .search-box { max-width: none; padding: 8px 14px; font-size: 13px; }
    .lang-dd-btn .lang-label { display: none; }
    .top-icon-link { display: none; }
  }

  .fav-toolbar {
    max-width: 1720px;
    margin: 0 auto;
    padding: 18px 24px 0;
    display: none;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
  }
  .fav-toolbar.visible { display: flex; }
  .export-btn,
  .clear-btn {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    background: var(--bg-elev);
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    transition: background 0.16s ease, border-color 0.16s ease, opacity 0.16s ease;
  }
  .export-btn:hover,
  .clear-btn:hover { background: var(--card-hover); border-color: rgba(255,255,255,0.16); }
  .export-btn:disabled,
  .clear-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .empty-state {
    max-width: 1720px;
    margin: 0 auto;
    padding: 44px 24px 92px;
    color: var(--text-mid);
    text-align: center;
    font-size: 15px;
  }
  .empty-state[hidden] { display: none; }

  prompt-card {
    display: block;
    break-inside: avoid;
    margin-bottom: 16px;
  }

  /* ============ MODAL (LIGHT) ============ */
  .modal-scrim {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.78);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  .modal-scrim.open { display: flex; animation: scrim-in 0.2s ease; }
  @keyframes scrim-in { from { opacity: 0; } to { opacity: 1; } }

  /* toast */
  .toast {
    position: fixed; left: 50%; bottom: 40px;
    transform: translateX(-50%) translateY(20px);
    background: rgba(16,16,20,0.96);
    color: #fff; font-size: 14px; font-weight: 500;
    padding: 12px 22px; border-radius: 999px;
    border: 1px solid rgba(167,139,250,0.3);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    opacity: 0; pointer-events: none;
    transition: all 0.25s ease;
    z-index: 200;
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast svg { width: 16px; height: 16px; color: var(--purple); }

  /* footer tip */
  .foot-tip { text-align: center; color: var(--text-dim); font-size: 12px; padding: 14px 0 30px; }

  /* ============ DETAIL MODAL ============ */
  .modal.hidden { display: none; }
  .modal {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .modal-card {
    position: relative;
    width: 92%;
    max-width: 720px;
    max-height: 88vh;
    overflow: auto;
    padding: 28px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow-hover);
    color: var(--text);
  }
  .modal-close {
    position: absolute; top: 12px; right: 14px; z-index: 1;
    width: 34px; height: 34px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 24px; line-height: 1;
    cursor: pointer;
  }
  .modal-close:hover { background: var(--card-hover); }
  .modal-favorite {
    position: absolute; top: 12px; right: 56px; z-index: 1;
    width: 34px; height: 34px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.16s ease, background 0.16s ease, transform 0.16s ease;
  }
  .modal-favorite:hover { opacity: 1; background: var(--card-hover); }
  .modal-favorite svg {
    width: 17px; height: 17px;
    fill: none; stroke: currentColor;
  }
  .modal-favorite.is-favorite { color: var(--accent); opacity: 1; }
  .modal-favorite.is-favorite svg { fill: var(--accent); stroke: var(--accent); }
  .modal-favorite.pop svg { animation: favorite-pop 180ms ease; }
  @keyframes favorite-pop {
    0% { transform: scale(1); }
    55% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .modal-hero {
    width: 100%;
    overflow: hidden;
    border-radius: 12px;
    background: var(--card);
    border: 1px solid var(--border);
  }
  .modal-hero img { width: 100%; border-radius: 12px; }
  .modal-hero-placeholder {
    width: 100%;
    min-height: 220px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim);
    background: linear-gradient(135deg, var(--card), var(--bg));
    font-size: 42px;
  }
  .modal-body { padding-top: 20px; }
  .modal-title {
    color: var(--text);
    font-size: 24px;
    line-height: 1.25;
    margin-bottom: 12px;
  }
  .modal-tags {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 18px;
  }
  .modal-tags .tag {
    padding: 5px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    color: var(--text-mid);
    font-size: 12px;
  }
  .modal-section { margin-top: 18px; }
  .modal-section-title {
    color: var(--text-mid);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .modal-prompt {
    background: #010409;
    color: #c9d1d9;
    padding: 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 320px;
    overflow-y: auto;
  }
  .modal-copy {
    background: var(--accent);
    color: #fff;
    border: 0;
    padding: 10px 18px;
    border-radius: 8px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.16s ease, transform 0.16s ease;
  }
  .modal-copy:hover { background: var(--accent-2); transform: translateY(-1px); }
  .modal-copy.copied { background: #10a37f; }
  .modal-atoms {
    display: grid;
    gap: 6px;
    margin-top: 8px;
  }
  .modal-atoms dt {
    color: var(--text-mid);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .modal-atoms dd {
    color: var(--text);
    margin: 0 0 12px;
    line-height: 1.55;
  }
  .modal-swatch {
    display: inline-block;
    width: 14px; height: 14px;
    border-radius: 3px;
    margin-right: 6px;
    vertical-align: -2px;
    border: 1px solid var(--border);
  }
  @media (max-width: 780px) {
    .modal { padding: 14px; align-items: flex-start; }
    .modal-card { width: 100%; max-height: 92vh; padding: 22px 18px; }
    .modal-title { font-size: 20px; padding-right: 34px; }
    .modal-hero-placeholder { min-height: 160px; }
  }
</style>
</head>
<body>

<!-- ============ TOP BAR (2-row sticky) ============ -->
<div class="topbar">
  <!-- Row 1 · logo + centered search + lang dropdown -->
  <div class="topbar-main">
    <div class="brand">
      <div class="brand-dot"></div>
      <span class="brand-name">GPT Image 2 Hub</span>
    </div>
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search-input" placeholder="搜 prompt / title / tag · 按回车或 300ms debounce"/>
    </div>
    <div class="top-right">
      <a class="top-icon-link" href="https://github.com" target="_blank" rel="noopener noreferrer" title="GitHub" aria-label="GitHub">

const ANON_ID_KEY = 'pa-anon-id';
const SIG_KEY     = 'pa-signals-v1';

function anonId() {
  let id = localStorage.getItem(ANON_ID_KEY);
  if (!id) {
    id = 'a_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    localStorage.setItem(ANON_ID_KEY, id);
  }
  return id;
}

function loadSignals() {
  try {
    const raw = localStorage.getItem(SIG_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return { seen:[], viewed:[], liked:[], copied:[], notInterested:[], affinity:{}, sessionStart: Date.now() };
}
const SIG = loadSignals();
function saveSignals() { localStorage.setItem(SIG_KEY, JSON.stringify(SIG)); }

function addUnique(arr, v) { if (!arr.includes(v)) arr.push(v); }
function bumpAffinity(cat, delta) {
  SIG.affinity[cat] = (SIG.affinity[cat] || 0) + delta;
}

// 信号记录(最强 → 最弱):copied > liked > viewed > seen
function markSeen(id, cat)        { addUnique(SIG.seen, id);     saveSignals(); }
function markViewed(id, cat)      { addUnique(SIG.viewed, id);   bumpAffinity(cat, 0.3); saveSignals(); }
function markLiked(id, cat)       { addUnique(SIG.liked, id);    bumpAffinity(cat, 1.0); saveSignals(); }
function markUnliked(id, cat)     { SIG.liked = SIG.liked.filter(x => x !== id); bumpAffinity(cat, -1.0); saveSignals(); }
function markCopied(id, cat)      { addUnique(SIG.copied, id);   bumpAffinity(cat, 2.0); saveSignals(); }
function markNotInterested(id, cat) {
  addUnique(SIG.notInterested, id);
  bumpAffinity(cat, -0.8);
  saveSignals();
}
function resetSignals() {
  Object.assign(SIG, { seen:[], viewed:[], liked:[], copied:[], notInterested:[], affinity:{}, sessionStart: Date.now() });
  saveSignals();
}

const FAVORITES_KEY = 'promptatlas.favorites';

function getFavorites() {
  try {
    const raw = localStorage.getItem(FAVORITES_KEY);
    const list = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(list)) return [];
    return Array.from(new Set(list.map(id => String(id)).filter(Boolean)));
  } catch (err) {
    console.warn('localStorage blocked', err);
    return [];
  }
}
function saveFavorites(ids) {
  try {
    localStorage.setItem(FAVORITES_KEY, JSON.stringify(Array.from(new Set(ids.map(id => String(id)).filter(Boolean)))));
  } catch (err) {
    console.warn('localStorage blocked', err);
  }
}
function isFavorite(id) {
  return getFavorites().includes(String(id));
}
function toggleFavorite(id) {
  const sid = String(id);
  const favorites = getFavorites();
  const next = favorites.includes(sid)
    ? favorites.filter(item => item !== sid)

  syncFavoriteUI(sid);
  updateFavoriteControls();
  if (activeTab === 'favorites') filterGallery(activeTab);
  return next.includes(sid);
}

// —— 排序 ——
function seededRand(seed) {
  let x = 0;
  const s = String(seed);
  for (let i = 0; i < s.length; i++) x = ((x * 1103515245) + s.charCodeAt(i) + 12345) & 0x7fffffff;
  return (x % 10000) / 10000;
}
function scoreCard(card, seed) {
  let s = 0;
  // 基础 · 全局热度 normalized(0-1)
  s += Math.min(card.likes / 15000, 1) * 1.0;
  // 亲和 · 用户喜欢的 cat 加权
  s += (SIG.affinity[card.cat] || 0) * 0.35;
  // 去重衰减 · 看过强衰减
  if (SIG.viewed.includes(card.id))      s -= 1.2;
  else if (SIG.seen.includes(card.id))   s -= 0.5;
  // 复制过不推(已用)· 但不完全隐藏
  if (SIG.copied.includes(card.id))      s -= 0.4;
  // 点心过适度降权(用户已收藏)
  if (SIG.liked.includes(card.id))       s -= 0.2;
  // 惊喜注入 · 防止完全一致排序
  s += seededRand(card.id + '|' + seed) * 0.18;
  return s;
}

// Feed 状态
const FEED = {
  seed: Date.now(),
  batchSize: 20,
  shown: 0,
};
function getFeed(cat = '推荐', from = 0, size = FEED.batchSize) {
  const pool = CARDS.filter(c => !SIG.notInterested.includes(c.id));
  const filtered = (cat === '推荐') ? pool : pool.filter(c => c.cat === cat);
  const ranked = filtered
    .map(c => ({ c, s: scoreCard(c, FEED.seed) }))
    .sort((a, b) => b.s - a.s)
    .map(x => x.c);
  return ranked.slice(from, from + size);
}
function feedTotal(cat = '推荐') {
  const pool = CARDS.filter(c => !SIG.notInterested.includes(c.id));
  return (cat === '推荐') ? pool.length : pool.filter(c => c.cat === cat).length;
}
function reshuffle() {
  FEED.seed = Date.now() + Math.random();
  FEED.shown = 0;
}

    // events
    const card = this.shadowRoot.querySelector('.card');

    card.addEventListener('click', (e) => {
      if (e.target.closest('button')) return;
      openDetail(id);
    });

    favoriteBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFavorite(id);
      pulseFavoriteButton(favoriteBtn);
    });

    copyBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      copyPrompt(data.prompt);
    });
  }

  syncFavorite() {
    const id = this.getAttribute('data-id');
    syncFavoriteButton(this.shadowRoot.querySelector('.favorite-btn'), id);
  }
}

      const btn = e.currentTarget;
      const on = toggleFavorite(this.current.id);

  open(id) {
    const data = CARDS.find(c => c.id === id);
    if (!data) return;
    this.current = data;
    const aMeta = AUTHOR_MODELS[data.authorModel] || { label: data.authorModel };
    const iMeta = IMAGE_MODELS[data.imageModel]   || { label: data.imageModel };
    const brand = MODEL_BRAND[data.authorModel]   || { grad: 'linear-gradient(135deg, #ff2e51, #a78bfa)', glyph: '◆' };
    const isZh  = (window.LANG || 'zh') === 'zh';

    // 主体
    const imgEl = this.shadowRoot.getElementById('m-img');
    if (data.img) {
      imgEl.src = data.img;
      imgEl.alt = data.title;
      imgEl.style.display = 'block';
    } else {
      imgEl.removeAttribute('src');
      imgEl.alt = '';
      imgEl.style.display = 'none';
    }
    this.shadowRoot.getElementById('m-title').textContent = isZh ? data.title : data.en;
    this.shadowRoot.getElementById('m-en').textContent    = isZh ? data.en    : data.title;
    this.shadowRoot.getElementById('m-prompt').textContent = data.prompt;

    // 品牌头像
    const avatarEl = this.shadowRoot.getElementById('m-avatar');
    avatarEl.style.background = brand.grad;
    this.shadowRoot.getElementById('m-avatar-glyph').textContent = brand.glyph;
    this.shadowRoot.getElementById('m-author').textContent = aMeta.label;
    this.shadowRoot.getElementById('m-author-hint').textContent = t('author.hint');

    // meta pills:@作者 · via 模型 · aspect
    this.shadowRoot.getElementById('m-meta-pills').innerHTML = `
      <span class="m-pill m-pill-author">@${escapeHtml(data.authorModel)}</span>
      <span class="m-pill m-pill-image">${isZh ? '出图' : 'via'} · ${escapeHtml(iMeta.label)}</span>
      <span class="m-pill m-pill-aspect">${escapeHtml(data.aspectLabel || data.aspect.replace('/', ':'))}</span>
    `;

    // 内容 tag
    this.shadowRoot.getElementById('m-tags').innerHTML = data.tags.map(tag => `<span class="tag">#${escapeHtml(tag)}</span>`).join('');

    // 文本标签
    this.shadowRoot.getElementById('m-prompt-label').textContent = t('modal.promptLabel');
    this.shadowRoot.getElementById('m-copy-label').textContent   = t('modal.copy');

    // 下载 / 新窗口 链接
    const slug = `prompt-atlas-${data.id}-${data.en.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '')}.png`;
    const dlEl = this.shadowRoot.getElementById('m-download');
    const openEl = this.shadowRoot.getElementById('m-open-new');
    dlEl.setAttribute('href', data.img || '#');
    dlEl.setAttribute('download', slug);
    dlEl.setAttribute('title', t('modal.download'));
    openEl.setAttribute('href', data.img || '#');

    // 点心
    const liked = isFavorite(id);
    const likeBtn = this.shadowRoot.getElementById('m-like');
    likeBtn.classList.toggle('liked', liked);
    this.shadowRoot.getElementById('m-like-num').textContent = formatK(data.likes + (liked ? 1 : 0));

    this.scrim.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  close() {
    this.scrim.classList.remove('open');
    document.body.style.overflow = '';
  }
}

}
function atomRow(label, value) {
  return value ? `<dt>${label}</dt><dd>${value}</dd>` : '';
}
function openDetail(id) {
  const data = CARDS.find(c => c.id === id);
  if (!data) return;

  const modal = document.getElementById('detail-modal');
  const isZh = (window.LANG || 'zh') === 'zh';
  modal.dataset.currentId = data.id;
  modal.querySelector('.modal-title').textContent = isZh ? data.title : data.en;
  modal.querySelector('.modal-prompt').textContent = data.prompt;
  syncFavoriteButton(modal.querySelector('[data-role="favorite"]'), data.id);

  const copyBtn = modal.querySelector('.modal-copy');
  clearTimeout(modalCopyTimer);
  copyBtn.textContent = '复制 prompt';
  copyBtn.classList.remove('copied');

  modal.querySelector('.modal-tags').innerHTML = data.tags
    .map(tag => `<span class="tag">${escapeHtml(tag)}</span>`)
    .join('');

  const heroEl = modal.querySelector('.modal-hero');
  if (data.img) {
    heroEl.innerHTML = `<img src="${escapeHtml(data.img)}" alt="${escapeHtml(data.title)}">`;
  } else {
    heroEl.innerHTML = `<div class="modal-hero-placeholder" style="aspect-ratio:${escapeHtml(data.aspect || '16/9')};">🎨</div>`;
  }

  const atoms = data.atoms || {};
  const styleSignatures = Array.isArray(atoms.style_signatures) && atoms.style_signatures.length
    ? atoms.style_signatures.map(escapeHtml).join(' · ')
    : '';
  const colorPalette = Array.isArray(atoms.color_palette) && atoms.color_palette.length
    ? atoms.color_palette.map(color => {
      const label = escapeHtml(color);
      return `<span class="modal-swatch" style="background:${safeCssColor(color)}"></span>${label}`;
    }).join(' ')
    : '';
  const exclude = Array.isArray(atoms.exclude) && atoms.exclude.length
    ? atoms.exclude.map(escapeHtml).join(' · ')
    : '';

  modal.querySelector('.modal-atoms').innerHTML = [
    atomRow('Subject', escapeHtml(atoms.subject || '')),
    atomRow('Style Signatures', styleSignatures),
    atomRow('Color Palette', colorPalette),
    atomRow('Lighting', escapeHtml(atoms.lighting || '')),
    atomRow('Exclude', exclude),
  ].filter(Boolean).join('');

  recordClick(data.id);
  modal.classList.remove('hidden');
  modal.setAttribute('aria-hidden', 'false');
}
function closeDetail() {
  const modal = document.getElementById('detail-modal');
  if (!modal) return;
  modal.classList.add('hidden');
  modal.setAttribute('aria-hidden', 'true');
  delete modal.dataset.currentId;
}
function recordClick(id) {
  try {
    const raw = localStorage.getItem(CLICK_KEY) || '[]';
    const list = JSON.parse(raw);
    const history = Array.isArray(list) ? list : [];
    history.push({ id: String(id), ts: Date.now() });
    localStorage.setItem('promptatlas.click_history', JSON.stringify(history));
  } catch (err) {
    console.warn('localStorage blocked', err);
  }
}

const detailModal = document.getElementById('detail-modal');
detailModal.querySelector('[data-role="overlay"]').addEventListener('click', closeDetail);
detailModal.querySelector('[data-role="close"]').addEventListener('click', closeDetail);
detailModal.querySelector('[data-role="favorite"]').addEventListener('click', (e) => {
  e.stopPropagation();
  const id = detailModal.dataset.currentId;
  if (!id) return;
  toggleFavorite(id);
  pulseFavoriteButton(e.currentTarget);
});
detailModal.querySelector('[data-role="copy"]').addEventListener('click', async () => {
  const text = detailModal.querySelector('.modal-prompt').textContent;
  const btn = detailModal.querySelector('.modal-copy');
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '已复制 ✓';
    btn.classList.add('copied');
    clearTimeout(modalCopyTimer);
    modalCopyTimer = setTimeout(() => {
      btn.textContent = '复制 prompt';
      btn.classList.remove('copied');
    }, 1500);
  } catch (err) {
    console.error('copy failed', err);
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDetail();
});

function formatK(n) {
  if (n >= 10000) return (n / 10000).toFixed(1).replace(/\.0$/, '') + 'w';
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
  return String(n);
}
function hashHue(s) {
  let h = 0;
  for (const c of s) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return h % 360;
}
async function copyPrompt(text) {
  try {
    await navigator.clipboard.writeText(text);
    showToast(t('toast.copied'));
  } catch (e) {
    console.error('copy failed', e);
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(t('toast.copied'));
  }
}
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-text').textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toast_t);
  window._toast_t = setTimeout(() => t.classList.remove('show'), 2200);
}

// ========================================================
// bootstrap
// ========================================================
const URL_PARAMS = new URLSearchParams(location.search);
window.LANG = URL_PARAMS.get('lang') || localStorage.getItem('pa-lang') || 'zh';

function splitFilterParam(name) {
  return (URL_PARAMS.get(name) || '')
    .split(',')
    .map(value => value.trim())
    .filter(Boolean);
}

const tabsEl = document.getElementById('gallery-tabs');
const catsEl = document.getElementById('cats');
const wf     = document.getElementById('waterfall');
const favToolbar = document.getElementById('fav-toolbar');
const favoritesEmpty = document.getElementById('favorites-empty');
const filterBar = document.getElementById('filter-bar');
const filterDetails = document.getElementById('filter-details');
const searchInput = document.getElementById('search-input');
const filterCount = document.getElementById('filter-count');
const clearFilterBtn = document.querySelector('.clear-filter-btn');
let activeCat = '推荐';
let activeTab = (URL_PARAMS.get('tab') === 'favorites' || location.hash === '#favorites') ? 'favorites' : 'all';
const FILTER_STATE = {
  q: URL_PARAMS.get('q') || '',
  tags: new Set(splitFilterParam('tags')),
  style: new Set(splitFilterParam('style')),
  aspect: new Set(splitFilterParam('aspect')),
  tab: activeTab,
};
let searchDebounceTimer = null;

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.dataset.i18n));
  document.querySelectorAll('[data-i18n-html]').forEach(el => el.innerHTML = t(el.dataset.i18nHtml));
  document.querySelectorAll('[data-i18n-ph]').forEach(el => el.placeholder = t(el.dataset.i18nPh));
  document.documentElement.lang = window.LANG === 'en' ? 'en' : 'zh-CN';
}

function renderCats() {
  const isEn = window.LANG === 'en';
  catsEl.innerHTML = CATS.map(c => {
    const label = isEn ? (CAT_EN[c] || c) : c;
    const active = c === activeCat ? ' active' : '';
    return `<button class="category${active}" data-cat="${c}">${label}</button>`;
  }).join('');
}

function updateFavoriteControls() {
  const count = getFavorites().length;
  const isFavorites = activeTab === 'favorites';
  tabsEl.querySelector('[data-tab="favorites"] .count').textContent = count;
  tabsEl.querySelectorAll('[data-tab]').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.tab === activeTab);
  });
  favToolbar.classList.toggle('visible', isFavorites);
  favToolbar.querySelector('.export-btn').disabled = count === 0;
  favToolbar.querySelector('.clear-btn').disabled = count === 0;
}
function exportFavorites() {
  const favorites = getFavorites();
  if (!favorites.length) return;
  const favSet = new Set(favorites);
  const payload = RAW_IMAGES.filter(img => favSet.has(String(img.id || '')));
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const today = new Date().toISOString().slice(0, 10);
  const link = document.createElement('a');
  link.href = url;
  link.download = `promptatlas-favorites-${today}.json`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}
function clearFavorites() {
  const n = getFavorites().length;
  if (!n) return;
  if (confirm(`确定清空 ${n} 条收藏吗?不可撤销 · 建议先导出 JSON 备份`)) {
    localStorage.removeItem(FAVORITES_KEY);
    syncFavoriteUI();
    filterGallery(activeTab);
  }
}
function selectedValues(name) {
  return Array.from(FILTER_STATE[name]).sort((a, b) => a.localeCompare(b));
}
function syncURL() {
  const params = new URLSearchParams();
  const q = FILTER_STATE.q.trim();
  const tags = selectedValues('tags');
  const style = selectedValues('style');
  const aspect = selectedValues('aspect');
  if (q) params.set('q', q);
  if (tags.length) params.set('tags', tags.join(','));
  if (style.length) params.set('style', style.join(','));
  if (aspect.length) params.set('aspect', aspect.join(','));
  if (FILTER_STATE.tab === 'favorites') params.set('tab', 'favorites');
  const query = params.toString();
  const hash = location.hash && location.hash !== '#favorites' ? location.hash : '';
  history.replaceState(null, '', `${location.pathname}${query ? `?${query}` : ''}${hash}`);
}
function updateFilterCount(visible, total) {
  filterCount.textContent = `显示 ${visible} / ${total} 张`;
}
function renderFiltered(visible) {
  wf.innerHTML = visible.map(c => `<prompt-card data-id="${c.id}"></prompt-card>`).join('');
  favoritesEmpty.hidden = !(activeTab === 'favorites' && visible.length === 0);
  updateFavoriteControls();
}
function applyFilter() {
  const q = FILTER_STATE.q.trim().toLowerCase();
  const filtered = allImages.filter(img => {
    if (FILTER_STATE.tab === 'favorites' && !isFavorite(img.id)) return false;
    if (activeCat !== '推荐' && img.cat !== activeCat) return false;
    if (q && !(
      (img.title || '').toLowerCase().includes(q) ||
      (img.en || '').toLowerCase().includes(q) ||
      (img.prompt || '').toLowerCase().includes(q) ||
      (img.tags || []).some(t => String(t).toLowerCase().includes(q))
    )) return false;
    if (FILTER_STATE.tags.size && !Array.from(FILTER_STATE.tags).every(t => (img.tags || []).includes(t))) return false;
    if (FILTER_STATE.style.size && !FILTER_STATE.style.has(img.style)) return false;
    if (FILTER_STATE.aspect.size && !FILTER_STATE.aspect.has(img.aspect)) return false;
    return true;
  });
  activeTab = FILTER_STATE.tab === 'favorites' ? 'favorites' : 'all';
  renderFiltered(filtered);
  updateFilterCount(filtered.length, allImages.length);
  syncURL();
}
function renderWaterfall() {
  applyFilter();
}
function filterGallery(tab = activeTab) {
  activeTab = tab === 'favorites' ? 'favorites' : 'all';
  FILTER_STATE.tab = activeTab;
  applyFilter();
}
function countValues(cards, getValues) {
  const counts = new Map();
  cards.forEach(card => {
    getValues(card).forEach(value => {
      if (!value) return;
      counts.set(value, (counts.get(value) || 0) + 1);
    });
  });
  return Array.from(counts.entries()).sort((a, b) => a[0].localeCompare(b[0]));
}
function renderFilterOptions() {
  const aspectLabels = new Map(allImages.map(img => [img.aspect, img.aspectLabel || img.aspect.replace('/', ':')]));
  const groups = [
    { name: 'tags', values: countValues(allImages, img => img.tags || []), label: value => value },
    { name: 'style', values: countValues(allImages, img => img.style ? [img.style] : []), label: value => value },
    { name: 'aspect', values: countValues(allImages, img => img.aspect ? [img.aspect] : []), label: value => aspectLabels.get(value) || value.replace('/', ':') },
  ];
  groups.forEach(group => {
    const el = filterBar.querySelector(`[data-options="${group.name}"]`);
    if (!el) return;
    el.innerHTML = group.values.map(([value, count]) => {
      const checked = FILTER_STATE[group.name].has(value) ? ' checked' : '';
      return `
        <label class="filter-chip">
          <input type="checkbox" data-filter-group="${group.name}" value="${escapeHtml(value)}"${checked} />
          <span>${escapeHtml(group.label(value))}</span>
          <span class="count">(${count})</span>
        </label>
      `;
    }).join('');
  });
}
function syncFilterInputs() {
  searchInput.value = FILTER_STATE.q;
  filterBar.querySelectorAll('input[type="checkbox"][data-filter-group]').forEach(input => {
    const group = input.dataset.filterGroup;
    input.checked = FILTER_STATE[group]?.has(input.value) || false;
  });
}
function clearFilters() {
  FILTER_STATE.q = '';
  FILTER_STATE.tags.clear();
  FILTER_STATE.style.clear();
  FILTER_STATE.aspect.clear();
  FILTER_STATE.tab = 'all';
  activeTab = 'all';
  activeCat = '推荐';
  renderCats();
  syncFilterInputs();
  applyFilter();
  history.replaceState(null, '', location.pathname);
}
function syncFilterDetailsMode() {
  if (!filterDetails) return;
  filterDetails.open = !window.matchMedia('(max-width: 780px)').matches;
}

tabsEl.addEventListener('click', (e) => {
  const b = e.target.closest('[data-tab]');
  if (!b) return;
  filterGallery(b.dataset.tab);
});
catsEl.addEventListener('click', (e) => {
  const b = e.target.closest('.category');
  if (!b) return;
  activeCat = b.dataset.cat;
  activeTab = 'all';
  FILTER_STATE.tab = 'all';
  catsEl.querySelectorAll('.category').forEach(x => x.classList.toggle('active', x === b));
  applyFilter();
});
filterBar.addEventListener('change', (e) => {
  const input = e.target.closest('input[type="checkbox"][data-filter-group]');
  if (!input) return;
  const group = input.dataset.filterGroup;
  if (!FILTER_STATE[group]) return;
  if (input.checked) FILTER_STATE[group].add(input.value);
  else FILTER_STATE[group].delete(input.value);
  applyFilter();
});
searchInput.addEventListener('input', () => {
  FILTER_STATE.q = searchInput.value;
  clearTimeout(searchDebounceTimer);
  searchDebounceTimer = setTimeout(() => applyFilter(), 300);
});
searchInput.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  clearTimeout(searchDebounceTimer);
  FILTER_STATE.q = searchInput.value;
  applyFilter();
});
clearFilterBtn.addEventListener('click', clearFilters);
window.addEventListener('resize', syncFilterDetailsMode);

favToolbar.querySelector('.export-btn').addEventListener('click', exportFavorites);
favToolbar.querySelector('.clear-btn').addEventListener('click', clearFavorites);

// ── 语言下拉 ──
const langDd     = document.getElementById('lang-dd');
const langDdBtn  = document.getElementById('lang-dd-btn');
const langDdMenu = document.getElementById('lang-dd-menu');
const langCurEl  = document.getElementById('lang-cur');

function renderLangMenu() {
  langDdMenu.innerHTML = LANGS.map(l => `
    <button class="lang-opt${l.id === window.LANG ? ' active' : ''}" data-lang="${l.id}" role="option">
      <span class="flag">${l.flag}</span>
      <span class="opt-native">${l.native}</span>
      <span class="opt-en">${l.en}</span>
    </button>
  `).join('');
}
function syncLangLabel() {
  const cur = LANGS.find(l => l.id === window.LANG) || LANGS[0];
  langCurEl.textContent = cur.native;
}
function toggleDd(open) {
  if (typeof open !== 'boolean') open = !langDd.classList.contains('open');
  langDd.classList.toggle('open', open);
  langDdBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
}
langDdBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleDd(); });
langDdMenu.addEventListener('click', (e) => {
  const b = e.target.closest('.lang-opt');
  if (!b) return;
  const newLang = b.dataset.lang;
  toggleDd(false);
  if (newLang === window.LANG) return;
  window.LANG = newLang;
  localStorage.setItem('pa-lang', window.LANG);
  syncLangLabel();
  renderLangMenu();
  applyI18n();
  renderCats();
  renderWaterfall();
});
document.addEventListener('click', (e) => {
  if (!langDd.contains(e.target)) toggleDd(false);
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') toggleDd(false);
});

// ── 初始化 ──
async function initGallery() {
  applyI18n();
  syncLangLabel();
  renderLangMenu();
  renderCats();
  syncFilterDetailsMode();
  syncFilterInputs();
  updateFavoriteControls();

  try {
    await loadImages();
    renderFilterOptions();
    syncFilterInputs();
    applyFilter();
  } catch (err) {
    console.error('failed to load gallery data', err);
  }

  // URL hash 自动开 modal(测试 / 分享链接用):#m-01
  if (location.hash.startsWith('#m-')) {
    const mid = location.hash.replace('#m-', '');
    setTimeout(() => openDetail(mid), 200);
  }
  // URL ?dd=1 自动开语言下拉(截图测试用)
  if (URL_PARAMS.get('dd') === '1') {
    setTimeout(() => toggleDd(true), 150);
  }
}

document.addEventListener('DOMContentLoaded', initGallery);
</script>
