<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GPT Image 2 Hub · AI 生图灵感图鉴</title>
<style>
  :root {
    --bg: #0a0a0b;
    --bg-elev: #161618;
    --card: #1a1a1d;
    --card-hover: #222227;
    --border: rgba(255,255,255,0.08);
    --text: rgba(255,255,255,0.96);
    --text-mid: rgba(255,255,255,0.65);
    --text-dim: rgba(255,255,255,0.42);
    --accent: #ff2e51;
    --accent-2: #ff6b8a;
    --purple: #a78bfa;
    --shadow-card: 0 4px 20px rgba(0,0,0,0.4);
    --shadow-hover: 0 12px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
    --radius-card: 14px;
    --fs: 15px;
    --fsn: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: var(--fsn); font-size: var(--fs); }
  body { min-height: 100vh; overflow-x: hidden; }
  img { max-width: 100%; display: block; }

  /* ============ HEADER (2-row sticky) ============ */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,10,11,0.85);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--border);
  }
  .topbar-main {
    max-width: 1600px; margin: 0 auto;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 24px;
    padding: 14px 28px 10px;
  }
  .topbar-cats {
    max-width: 1600px; margin: 0 auto;
    padding: 2px 28px 14px;
  }

  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 18px; letter-spacing: -0.01em;
    white-space: nowrap;
  }
  .brand-dot {
    width: 26px; height: 26px; border-radius: 8px;
    background: linear-gradient(135deg, #ff2e51, #a78bfa);
    box-shadow: 0 4px 14px rgba(255,46,81,0.35);
  }
  .brand-name { background: linear-gradient(90deg, #fff, #a78bfa); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .brand-sub { display: none; }

  /* 搜索(居中 · 宽) */
  .search-box {
    justify-self: center;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 18px; border-radius: 999px;
    background: var(--bg-elev); border: 1px solid var(--border);
    color: var(--text-mid); font-size: 14px;
    width: 100%;
    max-width: 540px;
    transition: border-color 0.18s ease, background 0.18s ease;
  }
  .search-box:focus-within { border-color: rgba(167,139,250,0.5); background: #1a1a20; }
  .search-box svg { width: 16px; height: 16px; opacity: 0.55; flex-shrink: 0; }
  .search-box input { flex: 1; background: transparent; border: none; color: var(--text); outline: none; font-family: inherit; font-size: 14px; }
  .search-box input::placeholder { color: var(--text-dim); }

  /* 分类条(独立行) */
  .categories {
    display: flex; gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .categories::-webkit-scrollbar { display: none; }
  .category {
    padding: 8px 16px; border-radius: 999px;
    background: transparent; color: var(--text-mid);
    font-size: 14px; font-weight: 500;
    border: none; cursor: pointer;
    white-space: nowrap;
    transition: all 0.18s ease;
  }
  .category:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .category.active {
    color: #fff; background: rgba(255,255,255,0.1);
    font-weight: 700;
  }

  /* 顶部右区:github + x + 语言 */
  .top-right {
    display: flex; align-items: center; gap: 6px;
  }
  .top-icon-link {
    width: 36px; height: 36px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    background: transparent; border: 1px solid transparent;
    color: var(--text-mid); cursor: pointer;
    text-decoration: none;
    transition: all 0.18s ease;
  }
  .top-icon-link:hover {
    color: var(--text);
    background: var(--bg-elev);
    border-color: var(--border);
  }
  .top-icon-link svg { width: 18px; height: 18px; }

  /* 语言下拉 */
  .lang-dd { position: relative; flex-shrink: 0; }
  .lang-dd-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 999px;
    background: var(--bg-elev); border: 1px solid var(--border);
    color: var(--text-mid); font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    transition: all 0.18s ease;
  }
  .lang-dd-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.18); }
  .lang-dd-btn .globe { width: 14px; height: 14px; opacity: 0.6; }
  .lang-dd-btn .caret { width: 10px; height: 10px; opacity: 0.55; transition: transform 0.2s; }
  .lang-dd.open .lang-dd-btn .caret { transform: rotate(180deg); }
  .lang-dd.open .lang-dd-btn { border-color: rgba(167,139,250,0.4); color: var(--text); }

  .lang-dd-menu {
    position: absolute; right: 0; top: calc(100% + 8px);
    min-width: 180px;
    background: rgba(22,22,24,0.98);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    padding: 6px;
    z-index: 60;
    display: none;
  }
  .lang-dd.open .lang-dd-menu { display: block; animation: dd-in 0.16s ease; }
  @keyframes dd-in { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

  .lang-opt {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 8px 12px;
    background: transparent; border: none; cursor: pointer;
    color: var(--text-mid); font-size: 13px; font-weight: 500;
    font-family: inherit;
    border-radius: 8px;
    text-align: left;
    transition: all 0.12s ease;
  }
  .lang-opt:hover { background: rgba(255,255,255,0.06); color: var(--text); }
  .lang-opt.active {
    background: linear-gradient(135deg, rgba(255,46,81,0.12), rgba(167,139,250,0.12));
    color: #fff;
  }
  .lang-opt .flag {
    font-size: 16px; line-height: 1;
    filter: saturate(1.15);
  }
  .lang-opt .opt-native {
    flex: 1;
    font-weight: 600;
  }
  .lang-opt .opt-en {
    font-size: 11px; color: var(--text-dim);
    font-weight: 500;
  }
  .lang-opt.active .opt-en { color: rgba(255,255,255,0.5); }

  /* ============ WATERFALL (卡宽固定 · 自动列数) ============ */
  .waterfall {
    max-width: 1720px; margin: 0 auto;
    padding: 20px 24px 80px;
    column-width: 280px;   /* 🔴 固定卡宽 · 内容可控 */
    column-gap: 16px;
  }
  @media (max-width: 780px) {
    .waterfall { column-width: 170px; column-gap: 10px; padding: 16px 14px 60px; }
    .topbar-main { padding: 10px 14px 8px; gap: 12px; grid-template-columns: auto 1fr auto; }
    .topbar-cats { padding: 0 14px 10px; }
    .search-box { max-width: none; padding: 8px 14px; font-size: 13px; }
    .lang-dd-btn .lang-label { display: none; }
    .top-icon-link { display: none; }
  }

  prompt-card {
    display: block;
    break-inside: avoid;
    margin-bottom: 16px;
  }

  /* ============ MODAL (LIGHT) ============ */
  .modal-scrim {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.78);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  .modal-scrim.open { display: flex; animation: scrim-in 0.2s ease; }
  @keyframes scrim-in { from { opacity: 0; } to { opacity: 1; } }

  /* toast */
  .toast {
    position: fixed; left: 50%; bottom: 40px;
    transform: translateX(-50%) translateY(20px);
    background: rgba(16,16,20,0.96);
    color: #fff; font-size: 14px; font-weight: 500;
    padding: 12px 22px; border-radius: 999px;
    border: 1px solid rgba(167,139,250,0.3);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    opacity: 0; pointer-events: none;
    transition: all 0.25s ease;
    z-index: 200;
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast svg { width: 16px; height: 16px; color: var(--purple); }

  /* footer tip */
  .foot-tip { text-align: center; color: var(--text-dim); font-size: 12px; padding: 14px 0 30px; }
</style>
</head>

// ========================================================
// FeedEngine · 信号 + 排序 + 投喂(可 swap backend)
// ========================================================
const ANON_ID_KEY = 'pa-anon-id';
const SIG_KEY     = 'pa-signals-v1';

function anonId() {
  let id = localStorage.getItem(ANON_ID_KEY);
  if (!id) {
    id = 'a_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    localStorage.setItem(ANON_ID_KEY, id);
  }
  return id;
}

function loadSignals() {
  try {
    const raw = localStorage.getItem(SIG_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return { seen:[], viewed:[], liked:[], copied:[], notInterested:[], affinity:{}, sessionStart: Date.now() };
}
const SIG = loadSignals();
function saveSignals() { localStorage.setItem(SIG_KEY, JSON.stringify(SIG)); }

function addUnique(arr, v) { if (!arr.includes(v)) arr.push(v); }
function bumpAffinity(cat, delta) {
  SIG.affinity[cat] = (SIG.affinity[cat] || 0) + delta;
}

// 信号记录(最强 → 最弱):copied > liked > viewed > seen
function markSeen(id, cat)        { addUnique(SIG.seen, id);     saveSignals(); }
function markViewed(id, cat)      { addUnique(SIG.viewed, id);   bumpAffinity(cat, 0.3); saveSignals(); }
function markLiked(id, cat)       { addUnique(SIG.liked, id);    bumpAffinity(cat, 1.0); saveSignals(); }
function markUnliked(id, cat)     { SIG.liked = SIG.liked.filter(x => x !== id); bumpAffinity(cat, -1.0); saveSignals(); }
function markCopied(id, cat)      { addUnique(SIG.copied, id);   bumpAffinity(cat, 2.0); saveSignals(); }
function markNotInterested(id, cat) {
  addUnique(SIG.notInterested, id);
  bumpAffinity(cat, -0.8);
  saveSignals();
}
function resetSignals() {
  Object.assign(SIG, { seen:[], viewed:[], liked:[], copied:[], notInterested:[], affinity:{}, sessionStart: Date.now() });
  saveSignals();
}

// —— 排序 ——
function seededRand(seed) {
  let x = 0;
  const s = String(seed);
  for (let i = 0; i < s.length; i++) x = ((x * 1103515245) + s.charCodeAt(i) + 12345) & 0x7fffffff;
  return (x % 10000) / 10000;
}
function scoreCard(card, seed) {
  let s = 0;
  // 基础 · 全局热度 normalized(0-1)
  s += Math.min(card.likes / 15000, 1) * 1.0;
  // 亲和 · 用户喜欢的 cat 加权
  s += (SIG.affinity[card.cat] || 0) * 0.35;
  // 去重衰减 · 看过强衰减
  if (SIG.viewed.includes(card.id))      s -= 1.2;
  else if (SIG.seen.includes(card.id))   s -= 0.5;
  // 复制过不推(已用)· 但不完全隐藏
  if (SIG.copied.includes(card.id))      s -= 0.4;
  // 点心过适度降权(用户已收藏)
  if (SIG.liked.includes(card.id))       s -= 0.2;
  // 惊喜注入 · 防止完全一致排序
  s += seededRand(card.id + '|' + seed) * 0.18;
  return s;
}

// Feed 状态
const FEED = {
  seed: Date.now(),
  batchSize: 20,
  shown: 0,
};
function getFeed(cat = '推荐', from = 0, size = FEED.batchSize) {
  const pool = CARDS.filter(c => !SIG.notInterested.includes(c.id));
  const filtered = (cat === '推荐') ? pool : pool.filter(c => c.cat === cat);
  const ranked = filtered
    .map(c => ({ c, s: scoreCard(c, FEED.seed) }))
    .sort((a, b) => b.s - a.s)
    .map(x => x.c);
  return ranked.slice(from, from + size);
}
function feedTotal(cat = '推荐') {
  const pool = CARDS.filter(c => !SIG.notInterested.includes(c.id));
  return (cat === '推荐') ? pool.length : pool.filter(c => c.cat === cat).length;
}
function reshuffle() {
  FEED.seed = Date.now() + Math.random();
  FEED.shown = 0;
}

          backdrop-filter: blur(20px) saturate(180%);
          -webkit-backdrop-filter: blur(20px) saturate(180%);
          border: 1px solid rgba(255,255,255,0.12);
          color: #fff;
          display: flex; align-items: center; justify-content: center;
          cursor: pointer; text-decoration: none;
          transition: all 0.22s cubic-bezier(.3, 1, .4, 1);
          box-shadow: 0 6px 22px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.06);
          position: relative;
          font-family: inherit;
        }
        .fab:hover {
          background: rgba(40,40,46,0.95);
          transform: translateY(-2px);
          box-shadow: 0 14px 34px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.1);
          border-color: rgba(255,255,255,0.22);
        }
        .fab:active { transform: translateY(0); }
        .fab svg { width: 22px; height: 22px; }

        .fab-like.liked {
          background: linear-gradient(135deg, #ff2e51, #ff6b8a);
          border-color: rgba(255,46,81,0.45);
          box-shadow: 0 6px 22px rgba(255,46,81,0.4);
        }
        .fab-like.liked svg { fill: #fff; stroke: #fff; }
        .fab-num {
          position: absolute; right: -2px; top: -6px;
          background: #fff; color: #0a0a0b;
          font-size: 10px; font-weight: 700;
          padding: 2px 6px; border-radius: 999px;
          min-width: 22px; text-align: center;
          box-shadow: 0 2px 8px rgba(0,0,0,0.4);
          font-family: "SF Mono", Menlo, Consolas, monospace;
        }
        .fab-like.liked .fab-num { background: #fff; color: #ff2e51; }

        .close {
          position: absolute; top: 16px; right: 16px; z-index: 10;
          width: 36px; height: 36px; border-radius: 50%;
          background: rgba(0,0,0,0.55); backdrop-filter: blur(10px);
          border: 1px solid rgba(255,255,255,0.1);
          color: #fff; cursor: pointer;
          display: flex; align-items: center; justify-content: center;
          transition: background 0.15s ease;
        }
        .close:hover { background: rgba(0,0,0,0.8); }

        @media (max-width: 900px) {
          .modal { grid-template-columns: 1fr; max-height: 94vh; }
          .media { max-height: 50vh; }
          .side { max-height: 44vh; padding: 20px; }
          .fab-group { right: 14px; bottom: 14px; gap: 8px; }
          .fab { width: 46px; height: 46px; }
          .prompt-block { margin-bottom: 74px; }
        }
      </style>

      <div class="scrim" id="scrim">
        <div class="modal">
          <button class="close" aria-label="关闭">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <div class="media"><img id="m-img" alt=""/></div>
          <div class="side">
            <div class="head">
              <div class="avatar" id="m-avatar"><span id="m-avatar-glyph">✱</span></div>
              <div class="author-stack">
                <div class="author-name" id="m-author"></div>
                <div class="author-hint" id="m-author-hint">Author</div>
              </div>
            </div>
            <div class="title" id="m-title"></div>
            <div class="en" id="m-en"></div>
            <div class="meta-pills" id="m-meta-pills"></div>
            <div class="tags" id="m-tags"></div>
            <div class="prompt-block">
              <div class="prompt-label">
                <div class="prompt-label-text" id="m-prompt-label">提示词</div>
                <button class="copy-big" id="m-copy">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                  <span id="m-copy-label">复制</span>
                </button>
              </div>
              <div class="prompt-text" id="m-prompt"></div>
            </div>
          </div>
          <!-- 浮动操作 · bottom-right -->
          <div class="fab-group">
            <a class="fab" id="m-open-new" href="#" target="_blank" rel="noopener" title="新窗口看原图" aria-label="open">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </a>
            <a class="fab" id="m-download" download title="下载图片" aria-label="download">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </a>
            <button class="fab fab-like" id="m-like" title="点心" aria-label="like">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              <span class="fab-num" id="m-like-num">0</span>
            </button>
          </div>
        </div>
      </div>
    `;

    this.scrim = this.shadowRoot.getElementById('scrim');
    this.shadowRoot.querySelector('.close').addEventListener('click', () => this.close());
    this.scrim.addEventListener('click', (e) => { if (e.target === this.scrim) this.close(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') this.close(); });

    this.shadowRoot.getElementById('m-copy').addEventListener('click', () => {
      if (!this.current) return;
      copyPrompt(this.current.prompt);
    });

    this.shadowRoot.getElementById('m-like').addEventListener('click', (e) => {
      if (!this.current) return;
      const btn = e.currentTarget;
      btn.classList.toggle('liked');
      const on = btn.classList.contains('liked');
      localStorage.setItem(`liked-${this.current.id}`, on ? '1' : '0');
      this.shadowRoot.getElementById('m-like-num').textContent = formatK(this.current.likes + (on ? 1 : 0));
      // also sync back card
      const card = document.querySelector(`prompt-card[data-id="${this.current.id}"]`);
      if (card) card.shadowRoot.querySelector('.like-btn').classList.toggle('liked', on);
    });
  }

  open(id) {
    const data = CARDS.find(c => c.id === id);
    if (!data) return;
    this.current = data;
    const aMeta = AUTHOR_MODELS[data.authorModel] || { label: data.authorModel };
    const iMeta = IMAGE_MODELS[data.imageModel]   || { label: data.imageModel };
    const brand = MODEL_BRAND[data.authorModel]   || { grad: 'linear-gradient(135deg, #ff2e51, #a78bfa)', glyph: '◆' };
    const isZh  = (window.LANG || 'zh') === 'zh';

    // 主体
    this.shadowRoot.getElementById('m-img').src = data.img;
    this.shadowRoot.getElementById('m-title').textContent = isZh ? data.title : data.en;
    this.shadowRoot.getElementById('m-en').textContent    = isZh ? data.en    : data.title;
    this.shadowRoot.getElementById('m-prompt').textContent = data.prompt;

    // 品牌头像
    const avatarEl = this.shadowRoot.getElementById('m-avatar');
    avatarEl.style.background = brand.grad;
    this.shadowRoot.getElementById('m-avatar-glyph').textContent = brand.glyph;
    this.shadowRoot.getElementById('m-author').textContent = aMeta.label;
    this.shadowRoot.getElementById('m-author-hint').textContent = t('author.hint');

    // meta pills:@作者 · via 模型 · aspect
    this.shadowRoot.getElementById('m-meta-pills').innerHTML = `
      <span class="m-pill m-pill-author">@${data.authorModel}</span>
      <span class="m-pill m-pill-image">${isZh ? '出图' : 'via'} · ${iMeta.label}</span>
      <span class="m-pill m-pill-aspect">${data.aspect.replace('/', ':')}</span>
    `;

    // 内容 tag
    this.shadowRoot.getElementById('m-tags').innerHTML = data.tags.map(tag => `<span class="tag">#${tag}</span>`).join('');

    // 文本标签
    this.shadowRoot.getElementById('m-prompt-label').textContent = t('modal.promptLabel');
    this.shadowRoot.getElementById('m-copy-label').textContent   = t('modal.copy');

    // 下载 / 新窗口 链接
    const slug = `prompt-atlas-${data.id}-${data.en.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '')}.png`;
    const dlEl = this.shadowRoot.getElementById('m-download');
    const openEl = this.shadowRoot.getElementById('m-open-new');
    dlEl.setAttribute('href', data.img);
    dlEl.setAttribute('download', slug);
    dlEl.setAttribute('title', t('modal.download'));
    openEl.setAttribute('href', data.img);

    // 点心
    const liked = localStorage.getItem(`liked-${id}`) === '1';
    const likeBtn = this.shadowRoot.getElementById('m-like');
    likeBtn.classList.toggle('liked', liked);
    this.shadowRoot.getElementById('m-like-num').textContent = formatK(data.likes + (liked ? 1 : 0));

    this.scrim.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  close() {
    this.scrim.classList.remove('open');
    document.body.style.overflow = '';
  }
}
customElements.define('prompt-modal', PromptModal);

// ========================================================
// helpers
// ========================================================
function formatK(n) {
  if (n >= 10000) return (n / 10000).toFixed(1).replace(/\.0$/, '') + 'w';
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
  return String(n);
}
function hashHue(s) {
  let h = 0;
  for (const c of s) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return h % 360;
}
async function copyPrompt(text) {
  try {
    await navigator.clipboard.writeText(text);
    showToast(t('toast.copied'));
  } catch (e) {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(t('toast.copied'));
  }
}
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-text').textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toast_t);
  window._toast_t = setTimeout(() => t.classList.remove('show'), 2200);
}

// ========================================================
// bootstrap
// ========================================================
const URL_PARAMS = new URLSearchParams(location.search);
window.LANG = URL_PARAMS.get('lang') || localStorage.getItem('pa-lang') || 'zh';

const catsEl = document.getElementById('cats');
const wf     = document.getElementById('waterfall');
let activeCat = '推荐';

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.dataset.i18n));
  document.querySelectorAll('[data-i18n-html]').forEach(el => el.innerHTML = t(el.dataset.i18nHtml));
  document.querySelectorAll('[data-i18n-ph]').forEach(el => el.placeholder = t(el.dataset.i18nPh));
  document.documentElement.lang = window.LANG === 'en' ? 'en' : 'zh-CN';
}

function renderCats() {
  const isEn = window.LANG === 'en';
  catsEl.innerHTML = CATS.map(c => {
    const label = isEn ? (CAT_EN[c] || c) : c;
    const active = c === activeCat ? ' active' : '';
    return `<button class="category${active}" data-cat="${c}">${label}</button>`;
  }).join('');
}

function renderWaterfall() {
  const visible = activeCat === '推荐' ? CARDS : CARDS.filter(c => c.cat === activeCat);
  wf.innerHTML = visible.map(c => `<prompt-card data-id="${c.id}"></prompt-card>`).join('');
}

catsEl.addEventListener('click', (e) => {
  const b = e.target.closest('.category');
  if (!b) return;
  activeCat = b.dataset.cat;
  catsEl.querySelectorAll('.category').forEach(x => x.classList.toggle('active', x === b));
  renderWaterfall();
});

// ── 语言下拉 ──
const langDd     = document.getElementById('lang-dd');
const langDdBtn  = document.getElementById('lang-dd-btn');
const langDdMenu = document.getElementById('lang-dd-menu');
const langCurEl  = document.getElementById('lang-cur');

function renderLangMenu() {
  langDdMenu.innerHTML = LANGS.map(l => `
    <button class="lang-opt${l.id === window.LANG ? ' active' : ''}" data-lang="${l.id}" role="option">
      <span class="flag">${l.flag}</span>
      <span class="opt-native">${l.native}</span>
      <span class="opt-en">${l.en}</span>
    </button>
  `).join('');
}
function syncLangLabel() {
  const cur = LANGS.find(l => l.id === window.LANG) || LANGS[0];
  langCurEl.textContent = cur.native;
}
function toggleDd(open) {
  if (typeof open !== 'boolean') open = !langDd.classList.contains('open');
  langDd.classList.toggle('open', open);
  langDdBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
}
langDdBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleDd(); });
langDdMenu.addEventListener('click', (e) => {
  const b = e.target.closest('.lang-opt');
  if (!b) return;
  const newLang = b.dataset.lang;
  toggleDd(false);
  if (newLang === window.LANG) return;
  window.LANG = newLang;
  localStorage.setItem('pa-lang', window.LANG);
  syncLangLabel();
  renderLangMenu();
  applyI18n();
  renderCats();
  renderWaterfall();
});
document.addEventListener('click', (e) => {
  if (!langDd.contains(e.target)) toggleDd(false);
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') toggleDd(false);
});

// ── 初始化 ──
applyI18n();
syncLangLabel();
renderLangMenu();
renderCats();
renderWaterfall();

// URL hash 自动开 modal(测试 / 分享链接用):#m-01
if (location.hash.startsWith('#m-')) {
  const mid = location.hash.replace('#m-', '');
  setTimeout(() => document.querySelector('prompt-modal').open(mid), 200);
}
// URL ?dd=1 自动开语言下拉(截图测试用)
if (URL_PARAMS.get('dd') === '1') {
  setTimeout(() => toggleDd(true), 150);
}
</script>
